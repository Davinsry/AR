<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebAR - Nico Davin (XI PPLG B)</title>

  <!-- A-Frame & AR.js (CDN stabil) -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: transparent;
    }

    /* Video feed dari AR.js harus di belakang */
    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: 0 !important;
    }

    /* Canvas A-Frame transparan agar video kelihatan */
    canvas.a-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 1 !important;
    }

    /* Scene juga fixed agar tidak geser */
    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 1 !important;
    }

    /* ====== UI MINIMALIS ====== */
    #ui-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 14px;
    }

    #ui-container > * { pointer-events: auto; }

    /* Status badge di kiri atas */
    #status-badge {
      width: fit-content;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .3s, color .3s;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #status-badge.scanning {
      background: rgba(255, 193, 7, 0.88);
      color: #332200;
    }

    #status-badge.found {
      background: rgba(40, 167, 69, 0.88);
      color: #fff;
    }

    #status-badge.error {
      background: rgba(220, 53, 69, 0.88);
      color: #fff;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    .scanning .dot { background: #332200; }
    .found .dot, .error .dot { background: #fff; animation: none; }

    @keyframes pulse {
      0%   { opacity: 1; transform: scale(1); }
      50%  { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Hint kecil di bawah tengah */
    #hint {
      text-align: center;
      color: rgba(255,255,255,0.95);
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 10px;
      margin: 0 auto 8px auto;
      max-width: 90vw;
      font-size: 12px;
      font-weight: 500;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      line-height: 1.45;
    }

    #hint a {
      color: #7ee8fa;
      text-decoration: underline;
      word-break: break-all;
    }

    #error-box {
      display: none;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: rgba(200, 30, 30, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      margin-top: 8px;
    }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const marker       = document.getElementById('hiro-marker');
      const statusBadge  = document.getElementById('status-badge');
      const errorBox     = document.getElementById('error-box');

      const setError = (msg) => {
        statusBadge.className = 'error';
        statusBadge.innerHTML = '<span class="dot"></span> ' + msg;
        errorBox.style.display = 'block';
        errorBox.textContent = 'Kamera diblokir / tidak tersedia. Buka di HP dengan HTTPS.';
      };

      // Cek secure context
      if (!window.isSecureContext) {
        setError('Gunakan HTTPS/localhost');
        console.warn('Not Secure Context');
      }

      // Pastikan scene loaded
      const scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', () => {
        console.log('Scene loaded');
        if (scene.renderer) {
          scene.renderer.setClearAlpha(0);
          scene.renderer.alpha = true;
        }
      });

      window.addEventListener('arjs-video-loaded', () => {
        console.log('Camera active');
      });

      window.addEventListener('camera-error', (e) => {
        console.error('Camera error', e);
        setError('Akses kamera ditolak');
      });

      // Marker events
      marker.addEventListener('markerFound', () => {
        statusBadge.className = 'found';
        statusBadge.innerHTML = '<span class="dot"></span> Target Ditemukan';
      });

      marker.addEventListener('markerLost', () => {
        statusBadge.className = 'scanning';
        statusBadge.innerHTML = '<span class="dot"></span> Mencari Marker...';
      });
    });
  </script>
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui-container">
    <div>
      <div id="status-badge" class="scanning">
        <span class="dot"></span> Mencari Marker...
      </div>
      <div id="error-box"></div>
    </div>

    <div id="hint">
      Arahkan kamera ke <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank" rel="noopener">Marker Hiro</a>
    </div>
  </div>

  <!-- A-Frame AR Scene -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;">

    <!-- Marker Hiro -->
    <a-marker preset="hiro" id="hiro-marker" emitevents="true">

      <!-- Teks 3D "Hai Cantik" yang berputar -->
      <a-text
        id="main-text"
        value="Hai Cantik"
        align="center"
        position="0 0.6 0"
        color="#FFD1DC"
        side="double"
        scale="2.5 2.5 2.5"
        font="exo2bold"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
      </a-text>

      <!-- Efek bayangan/bawah teks -->
      <a-plane
        position="0 0 0"
        rotation="-90 0 0"
        width="2"
        height="2"
        color="#000"
        opacity="0.2"
        transparent="true">
      </a-plane>

    </a-marker>

    <!-- Kamera AR -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
