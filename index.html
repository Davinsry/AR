<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR – Hai Cantikk 💖</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
    }

    #status {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      color: #fff;
      padding: 9px 22px;
      border-radius: 99px;
      font-size: 12px;
      font-family: sans-serif;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 9999;
      transition: all 0.4s ease;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f87171;
      animation: blink 1.4s ease-in-out infinite;
    }

    #status.found .dot {
      background: #4ade80;
      animation: none;
    }

    #status.found {
      border-color: rgba(74, 222, 128, 0.35);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    #instruction {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      padding: 13px 20px;
      border-radius: 16px;
      font-size: 12px;
      font-family: sans-serif;
      text-align: center;
      line-height: 1.8;
      z-index: 9999;
      max-width: 280px;
      transition: opacity 0.5s ease;
    }

    #instruction a {
      color: #f9a8d4;
      text-decoration: none;
      font-weight: bold;
    }

    #instruction.hide {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <a-scene embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true;" vr-mode-ui="enabled: false">

    <a-assets>
      <!-- Canvas texture untuk tulisan "Hai Cantikk" -->
      <canvas id="text-canvas" width="1024" height="256"></canvas>
    </a-assets>

    <a-marker preset="hiro" id="hiro-marker">

      <!-- Tulisan "Hai Cantikk" sebagai texture canvas — besar & jelas -->
      <a-plane id="text-plane" width="3.2" height="0.8" position="0 1.6 0" rotation="-10 0 0"
        material="src: #text-canvas; transparent: true; alphaTest: 0.01; opacity: 0"
        animation__opacity="property: material.opacity; from: 0; to: 1; startEvents: markerFound; dur: 600; easing: easeOutCubic"
        animation__float="property: position; from: 0 1.6 0; to: 0 1.75 0; loop: true; dur: 1800; dir: alternate; easing: easeInOutSine"></a-plane>

      <!-- Glow plane di belakang teks -->
      <a-plane width="3.4" height="0.9" position="0 1.6 -0.01" rotation="-10 0 0"
        material="color: #e879f9; transparent: true; opacity: 0; shader: flat"
        animation__glow="property: material.opacity; from: 0; to: 0.18; startEvents: markerFound; dur: 800; easing: easeOutCubic"
        animation__pulse="property: material.opacity; from: 0.1; to: 0.28; loop: true; dur: 1400; dir: alternate; easing: easeInOutSine; startEvents: markerFound"
        animation__float="property: position; from: 0 1.6 -0.01; to: 0 1.75 -0.01; loop: true; dur: 1800; dir: alternate; easing: easeInOutSine"></a-plane>

      <!-- Sub teks "You're so beautiful" -->
      <a-plane id="sub-plane" width="2.4" height="0.4" position="0 1.05 0" rotation="-10 0 0"
        material="src: #sub-canvas; transparent: true; alphaTest: 0.01; opacity: 0"
        animation__opacity="property: material.opacity; from: 0; to: 1; startEvents: markerFound; delay: 300; dur: 700; easing: easeOutCubic"
        animation__float="property: position; from: 0 1.05 0; to: 0 1.18 0; loop: true; dur: 2100; dir: alternate; easing: easeInOutSine"></a-plane>

      <!-- Partikel bintang kecil berputar -->
      <a-entity position="0 0.6 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
        <a-entity geometry="primitive: tetrahedron; radius: 0.07" material="color: #f9a8d4; shader: flat; opacity: 0.9"
          position="1.2 0.3 0"
          animation="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; loop: true; dur: 700; dir: alternate; easing: easeInOutSine">
        </a-entity>
        <a-entity geometry="primitive: tetrahedron; radius: 0.055" material="color: #e879f9; shader: flat; opacity: 0.8"
          position="-1.2 0.2 0"
          animation="property: scale; from: 1 1 1; to: 1.5 1.5 1.5; loop: true; dur: 900; dir: alternate; easing: easeInOutSine">
        </a-entity>
        <a-entity geometry="primitive: tetrahedron; radius: 0.05" material="color: #fff; shader: flat; opacity: 0.7"
          position="0 0.4 1.1"
          animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; loop: true; dur: 600; dir: alternate; easing: easeInOutSine">
        </a-entity>
      </a-entity>

      <!-- Ring tipis dekoratif di bawah teks -->
      <a-entity geometry="primitive: torus; radius: 0.9; radiusTubular: 0.008"
        material="color: #f472b6; shader: flat; opacity: 0.5; transparent: true" position="0 0.02 0" rotation="90 0 0"
        animation="property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 6000; easing: linear">
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- Canvas sub teks -->
  <canvas id="sub-canvas" width="768" height="128" style="display:none"></canvas>

  <!-- Status -->
  <div id="status">
    <span class="dot"></span>
    <span id="status-text">Scan layar laptop...</span>
  </div>

  <!-- Instruksi -->
  <div id="instruction">
    Arahkan kamera HP ke <strong>layar laptop</strong><br />
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">
      👆 Buka Hiro Marker di laptop
    </a><br />
    <span style="opacity:0.5;font-size:11px;">Pastikan marker terlihat jelas di kamera</span>
  </div>

  <script>
    // ── Gambar tulisan "Hai Cantikk" ke canvas ──
    function drawMainText() {
      const canvas = document.getElementById('text-canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Gradient teks
      const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.4, '#f9a8d4');
      grad.addColorStop(1, '#e879f9');

      // Glow
      ctx.shadowColor = '#f472b6';
      ctx.shadowBlur = 38;

      ctx.font = 'italic 700 110px Georgia, serif';
      ctx.fillStyle = grad;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Hai Cantikk 💖', canvas.width / 2, canvas.height / 2);

      // Update material A-Frame
      const plane = document.getElementById('text-plane');
      if (plane) {
        plane.setAttribute('material', 'src', canvas);
      }
    }

    function drawSubText() {
      const canvas = document.getElementById('sub-canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.shadowColor = '#f472b6';
      ctx.shadowBlur = 20;
      ctx.font = '300 42px Georgia, serif';
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText("you're so beautiful ✨", canvas.width / 2, canvas.height / 2);

      const plane = document.getElementById('sub-plane');
      if (plane) {
        plane.setAttribute('material', 'src', canvas);
      }
    }

    // Jalankan setelah scene siap
    const scene = document.querySelector('a-scene');
    scene.addEventListener('loaded', () => {
      drawMainText();
      drawSubText();
    });

    // ── Marker events ──
    const marker = document.getElementById('hiro-marker');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const instruction = document.getElementById('instruction');

    marker.addEventListener('markerFound', () => {
      marker.emit('markerFound');
      statusEl.classList.add('found');
      statusText.textContent = 'Ketemu! 💖';
      instruction.classList.add('hide');
    });

    marker.addEventListener('markerLost', () => {
      statusEl.classList.remove('found');
      statusText.textContent = 'Scan layar laptop...';
      instruction.classList.remove('hide');
    });
  </script>

</body>

</html>
