<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WebAR - Nico Davin (XI PPLG B)</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #000;
      width: 100vw;
      height: 100vh;
    }

    /* UI di atas scene */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
    }

    #status {
      width: fit-content;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 193, 7, 0.92);
      color: #332200;
      transition: background .3s, color .3s;
    }

    #status.found {
      background: rgba(40, 167, 69, 0.92);
      color: #fff;
    }

    #hint {
      align-self: center;
      background: rgba(0,0,0,0.45);
      color: #fff;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      text-align: center;
      line-height: 1.5;
    }

    #hint a {
      color: #7ee8fa;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui">
    <div id="status">Mencari Marker...</div>
    <div id="hint">
      Arahkan kamera ke <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">Marker Hiro</a>
    </div>
  </div>

  <!-- Scene AR -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="alpha: true">

    <a-marker preset="hiro" id="hiro-marker" emitevents="true">
      <a-text
        value="Hai Cantik"
        align="center"
        position="0 0.6 0"
        color="#FFD1DC"
        scale="2.5 2.5 2.5"
        side="double"
        font="exo2bold">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.getElementById('hiro-marker');
    const status = document.getElementById('status');

    marker.addEventListener('markerFound', () => {
      status.className = 'found';
      status.textContent = 'Target Ditemukan';
    });

    marker.addEventListener('markerLost', () => {
      status.className = '';
      status.textContent = 'Mencari Marker...';
    });
  </script>

</body>
</html>
