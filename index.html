<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR – Hai Cantikk 💖</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background: #000;
      overflow: hidden;
    }

    /* UI Overlay */
    #ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* Status badge */
    #status {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 10px 22px;
      border-radius: 99px;
      font-size: 13px;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.4s ease;
      pointer-events: none;
    }

    #status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f87171;
      animation: pulse 1.4s ease-in-out infinite;
    }

    #status.found .dot {
      background: #4ade80;
      animation: none;
    }

    #status.found {
      border-color: rgba(74, 222, 128, 0.4);
      background: rgba(0, 0, 0, 0.75);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    /* Instruction card */
    #instruction {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      padding: 14px 24px;
      border-radius: 16px;
      font-size: 12px;
      text-align: center;
      line-height: 1.7;
      max-width: 320px;
      pointer-events: all;
    }

    #instruction a {
      color: #f9a8d4;
      text-decoration: none;
      font-weight: bold;
    }

    #instruction a:hover {
      text-decoration: underline;
    }

    /* Corner watermark */
    #watermark {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.1em;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <!-- AR Scene -->
  <a-scene embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true;" vr-mode-ui="enabled: false"
    loading-screen="dotsColor: #f9a8d4; backgroundColor: black">

    <!-- Hiro Marker -->
    <a-marker preset="hiro" id="hiro-marker">

      <!-- Gradient box via shader -->
      <a-entity id="main-box" geometry="primitive: box; width: 0.6; height: 0.6; depth: 0.6"
        material="shader: flat; color: #ec4899"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
        animation__scale="property: scale; from: 1 1 1; to: 1.08 1.08 1.08; loop: true; dur: 900; dir: alternate; easing: easeInOutSine"
        position="0 0.3 0">
      </a-entity>

      <!-- Inner glow sphere -->
      <a-entity geometry="primitive: sphere; radius: 0.28"
        material="shader: flat; color: #f472b6; opacity: 0.35; transparent: true"
        animation="property: rotation; to: 360 0 360; loop: true; dur: 4000; easing: linear"
        animation__pulse="property: material.opacity; from: 0.2; to: 0.5; loop: true; dur: 1200; dir: alternate; easing: easeInOutSine"
        position="0 0.3 0">
      </a-entity>

      <!-- "Hai Cantikk" teks 3D -->
      <a-entity text="value: Hai Cantikk 💖; color: #fff; align: center; width: 2.2; font: mozillavr"
        position="0 0.85 0"
        animation__float="property: position; from: 0 0.85 0; to: 0 0.98 0; loop: true; dur: 1600; dir: alternate; easing: easeInOutSine"
        scale="1 1 1">
      </a-entity>

      <!-- Sub-teks kecil di bawah box -->
      <a-entity text="value: You're beautiful 🌸; color: #f9a8d4; align: center; width: 1.8; font: mozillavr"
        position="0 -0.05 0"
        animation__float2="property: position; from: 0 -0.05 0; to: 0 0.02 0; loop: true; dur: 2000; dir: alternate; easing: easeInOutSine">
      </a-entity>

      <!-- Ring dekoratif -->
      <a-entity geometry="primitive: torus; radius: 0.55; radiusTubular: 0.015"
        material="shader: flat; color: #f472b6; opacity: 0.7; transparent: true" position="0 0.3 0" rotation="90 0 0"
        animation="property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 5000; easing: linear">
      </a-entity>

      <!-- Ring ke-2 miring -->
      <a-entity geometry="primitive: torus; radius: 0.45; radiusTubular: 0.01"
        material="shader: flat; color: #e879f9; opacity: 0.5; transparent: true" position="0 0.3 0" rotation="45 0 0"
        animation="property: rotation; from: 45 360 0; to: 45 0 0; loop: true; dur: 3500; easing: linear">
      </a-entity>

    </a-marker>

    <!-- Kamera AR -->
    <a-entity camera></a-entity>

  </a-scene>

  <!-- UI Overlay -->
  <div id="ui">
    <div id="status">
      <span class="dot"></span>
      <span id="status-text">Mencari Hiro Marker...</span>
    </div>

    <div id="instruction">
      Arahkan kamera ke <strong>Hiro Marker</strong><br />
      <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">
        👆 Buka gambar Hiro Marker di sini
      </a>
      <br /><span style="opacity:0.6; font-size:11px;">Buka di tab lain → tampilkan di layar lain → arahkan kamera ke
        sana</span>
    </div>

    <div id="watermark">WebAR · AR.js</div>
  </div>

  <script>
    const marker = document.getElementById('hiro-marker');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const instruction = document.getElementById('instruction');

    marker.addEventListener('markerFound', () => {
      statusEl.classList.add('found');
      statusText.textContent = 'Target Ditemukan ✓';
      instruction.style.opacity = '0';
      instruction.style.transition = 'opacity 0.5s';
    });

    marker.addEventListener('markerLost', () => {
      statusEl.classList.remove('found');
      statusText.textContent = 'Mencari Hiro Marker...';
      instruction.style.opacity = '1';
    });
  </script>

</body>

</html>
