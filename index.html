<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR – Hai Cantikk</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }

    #status {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      padding: 9px 22px;
      border-radius: 99px;
      font-size: 12px;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 9999;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f87171;
      animation: blink 1.4s ease-in-out infinite;
    }

    #status.found .dot {
      background: #4ade80;
      animation: none;
    }

    #status.found {
      border-color: rgba(74, 222, 128, 0.4);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    #instruction {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      padding: 14px 22px;
      border-radius: 16px;
      font-size: 12px;
      text-align: center;
      line-height: 1.8;
      z-index: 9999;
      max-width: 290px;
      transition: opacity 0.5s;
    }

    #instruction a {
      color: #f9a8d4;
      text-decoration: none;
      font-weight: bold;
    }

    #instruction.hide {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="antialias: true;"
    vr-mode-ui="enabled: false">

    <a-marker preset="hiro" id="hiro-marker">

      <!-- Tulisan utama "Hai Cantikk" -->
      <a-text value="Hai Cantikk" color="#ff69b4" align="center" width="6" position="0 1.5 0" rotation="-90 0 0"
        animation__float="property: position; from: 0 1.5 0; to: 0 1.7 0; loop: true; dur: 1600; dir: alternate; easing: easeInOutSine">
      </a-text>

      <!-- Emoji hati terpisah di bawah tulisan -->
      <a-text value="💖 you're so beautiful 💖" color="#ffffff" align="center" width="4" position="0 0.9 0"
        rotation="-90 0 0"
        animation__float="property: position; from: 0 0.9 0; to: 0 1.05 0; loop: true; dur: 2000; dir: alternate; easing: easeInOutSine">
      </a-text>

      <!-- Ring dekoratif -->
      <a-torus color="#f472b6" radius="0.8" radius-tubular="0.01" position="0 0.01 0" rotation="90 0 0"
        animation="property: rotation; from: 90 0 0; to: 90 360 0; loop: true; dur: 5000; easing: linear">
      </a-torus>

      <!-- Bintang kecil kiri -->
      <a-tetrahedron color="#f9a8d4" radius="0.08" position="-1.1 0.5 0"
        animation="property: rotation; to: 360 360 0; loop: true; dur: 2000; easing: linear"
        animation__float="property: position; from: -1.1 0.5 0; to: -1.1 0.7 0; loop: true; dur: 1200; dir: alternate; easing: easeInOutSine">
      </a-tetrahedron>

      <!-- Bintang kecil kanan -->
      <a-tetrahedron color="#e879f9" radius="0.07" position="1.1 0.5 0"
        animation="property: rotation; to: 0 360 360; loop: true; dur: 2500; easing: linear"
        animation__float="property: position; from: 1.1 0.5 0; to: 1.1 0.65 0; loop: true; dur: 1400; dir: alternate; easing: easeInOutSine">
      </a-tetrahedron>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <div id="status">
    <span class="dot"></span>
    <span id="status-text">Scan layar laptop...</span>
  </div>

  <div id="instruction">
    Arahkan kamera HP ke <strong>layar laptop</strong><br />
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">
      👆 Buka Hiro Marker di laptop dulu
    </a><br />
    <span style="opacity:0.5;font-size:11px;">Fullscreen marker biar lebih gampang kedeteksi</span>
  </div>

  <script>
    const marker = document.getElementById('hiro-marker');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const instruction = document.getElementById('instruction');

    marker.addEventListener('markerFound', () => {
      statusEl.classList.add('found');
      statusText.textContent = 'Ketemu! 💖';
      instruction.classList.add('hide');
    });

    marker.addEventListener('markerLost', () => {
      statusEl.classList.remove('found');
      statusText.textContent = 'Scan layar laptop...';
      instruction.classList.remove('hide');
    });
  </script>

</body>

</html>
