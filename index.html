<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WebAR - Nico Davin (XI PPLG B)</title>

  <!-- A-Frame & AR.js (CDN stabil) -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #000;
    }

    /* Biarkan AR.js mengatur video & canvas sendiri.
       Hanya pastikan body full viewport. */

    #ui-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 999;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
    }

    #ui-container > * { pointer-events: auto; }

    #header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    #nama-badge {
      background: rgba(0,0,0,0.45);
      color: #fff;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(4px);
      pointer-events: none;
      width: fit-content;
      margin-bottom: 6px;
    }

    #status-badge {
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.3s, color 0.3s;
    }

    #status-badge.scanning {
      background: rgba(255, 193, 7, 0.9);
      color: #332200;
    }

    #status-badge.found {
      background: rgba(40, 167, 69, 0.9);
      color: #fff;
    }

    #status-badge.error {
      background: rgba(220, 53, 69, 0.9);
      color: #fff;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    .scanning .dot { background: #332200; }
    .found .dot { background: #fff; animation: none; }
    .error .dot { background: #fff; animation: none; }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    #btn-ganti {
      background: rgba(255,255,255,0.95);
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 700;
      color: #222;
      cursor: pointer;
      font-size: 13px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: transform 0.1s, background 0.2s;
    }

    #btn-ganti:active {
      transform: scale(0.96);
      background: rgba(240,240,240,0.98);
    }

    #instructions {
      text-align: center;
      color: #fff;
      background: rgba(0,0,0,0.55);
      padding: 12px 16px;
      border-radius: 12px;
      margin: 0 auto 12px auto;
      max-width: 92vw;
      font-size: 13px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
    }

    #instructions a {
      color: #4fc3f7;
      text-decoration: underline;
      word-break: break-all;
    }

    /* Pesan jika browser tidak support / kamera di blok */
    #error-box {
      display: none;
      text-align: center;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: rgba(200, 30, 30, 0.85);
      backdrop-filter: blur(4px);
    }
  </style>

  <script>
    // Registrasi Shader Gradasi
    AFRAME.registerShader('gradient', {
      schema: {
        topColor:    { type: 'color', default: '#00d2ff', is: 'uniform' },
        bottomColor: { type: 'color', default: '#3a7bd5', is: 'uniform' }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        void main() {
          gl_FragColor = vec4(mix(bottomColor, topColor, vUv.y), 1.0);
        }
      `
    });

    document.addEventListener('DOMContentLoaded', () => {
      const marker       = document.getElementById('hiro-marker');
      const statusBadge  = document.getElementById('status-badge');
      const btnGanti     = document.getElementById('btn-ganti');
      const errorBox     = document.getElementById('error-box');

      const setError = (msg) => {
        statusBadge.className = 'error';
        statusBadge.innerHTML = '<span class="dot"></span> ' + msg;
        errorBox.style.display = 'block';
        errorBox.textContent = 'Jika dibuka di desktop, pastikan ada kamera. Buka di HP untuk pengalaman AR terbaik.';
      };

      // Cek secure context
      if (!window.isSecureContext) {
        setError('Gunakan HTTPS/localhost');
        console.warn('Not Secure Context');
      }

      // Pastikan scene loaded sebelum pasang event marker
      const scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', () => {
        console.log('Scene loaded');
      });

      // Jika AR.js berhasil/gagal load video
      window.addEventListener('arjs-video-loaded', () => {
        console.log('Camera active');
      });

      window.addEventListener('camera-error', (e) => {
        console.error('Camera error', e);
        setError('Akses kamera ditolak');
      });

      // Marker events
      marker.addEventListener('markerFound', () => {
        statusBadge.className = 'found';
        statusBadge.innerHTML = '<span class="dot"></span> Target Ditemukan ✓';
      });

      marker.addEventListener('markerLost', () => {
        statusBadge.className = 'scanning';
        statusBadge.innerHTML = '<span class="dot"></span> Mencari Marker...';
      });

      // Switch object
      const objects = ['obj-box', 'obj-sphere', 'obj-cylinder'];
      let currentIndex = 0;

      btnGanti.addEventListener('click', () => {
        document.getElementById(objects[currentIndex]).setAttribute('visible', false);
        currentIndex = (currentIndex + 1) % objects.length;
        document.getElementById(objects[currentIndex]).setAttribute('visible', true);
      });
    });
  </script>
</head>
<body>

  <!-- UI Overlay -->
  <div id="ui-container">
    <div>
      <div id="nama-badge">Nico Davin — XI PPLG B</div>
      <div id="header">
        <div id="status-badge" class="scanning">
          <span class="dot"></span> Mencari Marker...
        </div>
        <button id="btn-ganti">Ganti Object</button>
      </div>
      <div id="error-box"></div>
    </div>

    <div id="instructions">
      <strong>Arahkan kamera ke Marker Hiro</strong><br>
      Belum punya marker? Buka di layar lain:<br>
      <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank" rel="noopener">
        Lihat Gambar Marker Hiro
      </a>
    </div>
  </div>

  <!-- A-Frame AR Scene -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;">

    <!-- Marker Hiro -->
    <a-marker preset="hiro" id="hiro-marker" emitevents="true">

      <!-- Container objek yang berputar (y: 0.25 agar tidak menancap ke marker) -->
      <a-entity
        id="spinning-objects"
        position="0 0.25 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">

        <a-box
          id="obj-box"
          material="shader: gradient; topColor: #00d2ff; bottomColor: #3a7bd5"
          depth="0.5"
          height="0.5"
          width="0.5"
          visible="true">
        </a-box>

        <a-sphere
          id="obj-sphere"
          material="shader: gradient; topColor: #00d2ff; bottomColor: #3a7bd5"
          radius="0.25"
          visible="false">
        </a-sphere>

        <a-cylinder
          id="obj-cylinder"
          material="shader: gradient; topColor: #00d2ff; bottomColor: #3a7bd5"
          radius="0.25"
          height="0.5"
          visible="false">
        </a-cylinder>
      </a-entity>

      <!-- Teks 3D di atas objek -->
      <a-text
        value="Hello AR!"
        align="center"
        position="0 0.9 0"
        color="#FFFFFF"
        side="double"
        scale="1.5 1.5 1.5"
        font="kelsonsans">
      </a-text>
    </a-marker>

    <!-- Kamera AR -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
