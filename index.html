<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR – Hai Cantikk 💖</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&family=Lato:wght@300&display=swap"
    rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Lato', sans-serif;
    }

    a-scene {
      width: 100vw;
      height: 100vh;
    }

    #hai-cantik {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      z-index: 9999;
      pointer-events: none;
      text-align: center;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #hai-cantik.show {
      opacity: 1;
      animation: floatUp 0.7s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    #hai-cantik.hide {
      animation: floatDown 0.5s ease forwards;
    }

    @keyframes floatUp {
      from {
        opacity: 0;
        transform: translate(-50%, -45%);
      }

      to {
        opacity: 1;
        transform: translate(-50%, -60%);
      }
    }

    @keyframes floatDown {
      from {
        opacity: 1;
        transform: translate(-50%, -60%);
      }

      to {
        opacity: 0;
        transform: translate(-50%, -75%);
      }
    }

    .main-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(52px, 10vw, 96px);
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #f9a8d4 40%, #e879f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(249, 168, 212, 0.7)) drop-shadow(0 0 8px rgba(232, 121, 249, 0.5));
      animation: shimmer 3s ease-in-out infinite;
      white-space: nowrap;
      line-height: 1.1;
    }

    @keyframes shimmer {

      0%,
      100% {
        filter: drop-shadow(0 0 32px rgba(249, 168, 212, 0.7)) drop-shadow(0 0 8px rgba(232, 121, 249, 0.5));
      }

      50% {
        filter: drop-shadow(0 0 48px rgba(249, 168, 212, 1)) drop-shadow(0 0 20px rgba(232, 121, 249, 0.9));
      }
    }

    .sub-text {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(13px, 2vw, 18px);
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-top: 10px;
      animation: fadePulse 2.5s ease-in-out infinite;
    }

    @keyframes fadePulse {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    .hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9998;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .hearts.show {
      opacity: 1;
    }

    .heart {
      position: absolute;
      animation: riseUp linear infinite;
      opacity: 0;
    }

    @keyframes riseUp {
      0% {
        transform: translateY(0) scale(0.6);
        opacity: 0;
      }

      10% {
        opacity: 0.8;
      }

      90% {
        opacity: 0.4;
      }

      100% {
        transform: translateY(-90vh) scale(1.1);
        opacity: 0;
      }
    }

    #status {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      color: #fff;
      padding: 9px 20px;
      border-radius: 99px;
      font-size: 12px;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 9999;
      transition: all 0.4s ease;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f87171;
      animation: blink 1.4s ease-in-out infinite;
    }

    #status.found .dot {
      background: #4ade80;
      animation: none;
    }

    #status.found {
      border-color: rgba(74, 222, 128, 0.35);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    #instruction {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
      padding: 14px 22px;
      border-radius: 16px;
      font-size: 12px;
      text-align: center;
      line-height: 1.8;
      z-index: 9999;
      max-width: 300px;
      transition: opacity 0.5s ease;
    }

    #instruction a {
      color: #f9a8d4;
      text-decoration: none;
      font-weight: bold;
    }

    #instruction.hide {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <a-scene embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true;" vr-mode-ui="enabled: false">
    <a-marker preset="hiro" id="hiro-marker"></a-marker>
    <a-entity camera></a-entity>
  </a-scene>

  <div id="hai-cantik">
    <div class="main-text">Hai Cantikk&nbsp;💖</div>
    <div class="sub-text">You're so beautiful</div>
  </div>

  <div class="hearts" id="hearts"></div>

  <div id="status">
    <span class="dot"></span>
    <span id="status-text">Mencari Hiro Marker...</span>
  </div>

  <div id="instruction">
    Arahkan kamera ke <strong>Hiro Marker</strong><br />
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">
      👆 Buka gambar Hiro Marker
    </a><br />
    <span style="opacity:0.5;font-size:11px;">Tampilkan di layar lain → arahkan kamera ke sana</span>
  </div>

  <script>
    const marker = document.getElementById('hiro-marker');
    const overlay = document.getElementById('hai-cantik');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const instruction = document.getElementById('instruction');
    const heartsEl = document.getElementById('hearts');

    const emojis = ['💖', '💗', '💕', '✨', '🌸', '💫'];
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.classList.add('heart');
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.bottom = '-30px';
      h.style.animationDuration = (4 + Math.random() * 5) + 's';
      h.style.animationDelay = (Math.random() * 5) + 's';
      h.style.fontSize = (14 + Math.random() * 14) + 'px';
      heartsEl.appendChild(h);
    }

    marker.addEventListener('markerFound', () => {
      overlay.classList.remove('hide');
      overlay.classList.add('show');
      heartsEl.classList.add('show');
      statusEl.classList.add('found');
      statusText.textContent = 'Marker ditemukan ✓';
      instruction.classList.add('hide');
    });

    marker.addEventListener('markerLost', () => {
      overlay.classList.remove('show');
      overlay.classList.add('hide');
      heartsEl.classList.remove('show');
      statusEl.classList.remove('found');
      statusText.textContent = 'Mencari Hiro Marker...';
      instruction.classList.remove('hide');
    });
  </script>

</body>

</html>
